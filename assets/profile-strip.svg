<svg width="900" height="240" viewBox="0 0 900 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="36" y1="18" x2="858" y2="224" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05070C"/>
      <stop offset="0.55" stop-color="#0A0D14"/>
      <stop offset="1" stop-color="#11151E"/>
    </linearGradient>
    <linearGradient id="panel" x1="40" y1="26" x2="854" y2="214" gradientUnits="userSpaceOnUse">
      <stop stop-color="#090D15"/>
      <stop offset="1" stop-color="#0F1622"/>
    </linearGradient>
    <radialGradient id="sphereGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(720 120) rotate(90) scale(74)">
      <stop offset="0" stop-color="#B4FFC8"/>
      <stop offset="0.26" stop-color="#7DFF9E"/>
      <stop offset="0.58" stop-color="#153126"/>
      <stop offset="1" stop-color="#0A0F17"/>
    </radialGradient>
    <radialGradient id="sphereCore" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(720 120) rotate(90) scale(58)">
      <stop offset="0" stop-color="#9DFFB7"/>
      <stop offset="0.2" stop-color="#5FD47F"/>
      <stop offset="0.5" stop-color="#163122"/>
      <stop offset="1" stop-color="#0A0E14"/>
    </radialGradient>
    <filter id="halo" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="240" rx="26" fill="url(#bg)"/>
  <rect x="20" y="20" width="860" height="200" rx="20" fill="url(#panel)" stroke="#232A36"/>

  <g opacity="0.06" stroke="white">
    <path d="M44 58H856"/>
    <path d="M44 108H856"/>
    <path d="M44 158H856"/>
    <path d="M130 34V206"/>
    <path d="M300 34V206"/>
    <path d="M470 34V206"/>
    <path d="M640 34V206"/>
  </g>

  <circle cx="50" cy="50" r="5" fill="#FB7185"/>
  <circle cx="70" cy="50" r="5" fill="#F59E0B"/>
  <circle cx="90" cy="50" r="5" fill="#34D399"/>

  <text x="128" y="57" fill="#C7D2FE" font-family="Consolas, Monaco, monospace" font-size="18">~/vladislav/portfolio.os</text>
  <text x="48" y="92" fill="#9CA3AF" font-family="Consolas, Monaco, monospace" font-size="15">$ launch profile --mode github</text>

  <text x="48" y="142" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700">Vladislav Bredihin</text>
